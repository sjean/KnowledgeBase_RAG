name: enterprise-ai-kb

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  milvus:
    image: milvusdb/milvus:v2.4.13
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: ./backend
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:h2:file:/app/data/aikb;MODE=MYSQL;AUTO_SERVER=TRUE
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-to-a-long-random-secret-key-at-least-32-bytes}
      APP_LLM_API_KEY: ${APP_LLM_API_KEY:-YOUR_API_KEY}
      APP_LLM_BASE_URL: ${APP_LLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4/}
      APP_LLM_MODEL_NAME: ${APP_LLM_MODEL_NAME:-glm-5}
      APP_LLM_EMBEDDING_MODEL: ${APP_LLM_EMBEDDING_MODEL:-embedding-3}
      APP_MILVUS_HOST: milvus
      APP_MILVUS_PORT: 19530
      APP_MILVUS_COLLECTION_NAME: ${APP_MILVUS_COLLECTION_NAME:-kb_chunks}
      APP_MILVUS_DIMENSION: ${APP_MILVUS_DIMENSION:-2048}
    depends_on:
      milvus:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "-X", "POST", "http://localhost:8080/auth/login", "-H", "Content-Type: application/json", "-d", "{\"username\":\"user\",\"password\":\"user123\"}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  backend_data:
